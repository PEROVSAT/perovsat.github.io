site_name: Documentation
site_description: Technical documentation for the PEROVSAT CubeSat mission
site_url: https://perovsat.github.io/documentation/
site_author: PEROVSAT Team

docs_dir: content
site_dir: site

repo_url: https://perovsat.github.io/
repo_name: Main site

theme:
  name: material
  custom_dir: content/overrides

  logo: assets/PerovskiteLogoV2DarkBG.png
  favicon: assets/PerovskiteLogoV2BlackBackgroundSquare.png

  palette:
    - scheme: default
      primary: custom
      accent: custom

  font:
    text: Source Sans 3
    code: JetBrains Mono

  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic : true


  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg


extra:
  generator: false
  main_site_url: /

extra_javascript:
- https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

