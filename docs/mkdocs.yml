site_name: PEROVSAT Documentation
site_description: Technical documentation for the PEROVSAT CubeSat mission
site_url: https://perovsat.github.io/documentation/
site_author: PEROVSAT Team

docs_dir: content
site_dir: site

repo_url: https://perovsat.github.io/
repo_name: Main site

theme:
  name: material
  custom_dir: content/overrides

  logo: assets/MissionPatchV1.png
  favicon: assets/MissionPatchV1.png

  icon:
    repo: fontawesome/solid/house

  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: perovsat
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode

  font:
    text: Source Sans 3
    code: JetBrains Mono

  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Software:
      - Tutorials:
          - Getting Started: software/tutorials/getting-started.md
      - How-to Guides: software/how-to/index.md
      - Reference: software/reference/index.md
      - Explanation: software/explanation/index.md
  - Payload: payload/index.md
  - Electronics: electronics/index.md

copyright: Copyright &copy; 2025 PEROVSAT — Rhodes College

extra:
  main_site_url: /
